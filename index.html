<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Чай для кента 🏳️‍🌈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;700;800&family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --rainbow:linear-gradient(100deg,#ff5a5f,#ff9f43,#ffd23f,#4ecb71,#2f9bff,#9b6dff,#ff6cab);
    --ink:#f5f1ff; --muted:#a89fc4; --faint:#6f6790;
    --glass:rgba(255,255,255,.06); --glass-hi:rgba(255,255,255,.10);
    --stroke:rgba(255,255,255,.12); --stroke-hi:rgba(255,255,255,.22);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:'Onest',system-ui,-apple-system,sans-serif;
    color:var(--ink); background:#0a0812;
    min-height:100svh; display:flex; align-items:center; justify-content:center;
    padding:env(safe-area-inset-top) 18px env(safe-area-inset-bottom);
    overflow-x:hidden; -webkit-font-smoothing:antialiased;
  }

  .aurora{position:fixed; inset:-20%; z-index:0; filter:blur(70px); opacity:.55; pointer-events:none;}
  .blob{position:absolute; width:46vmax; height:46vmax; border-radius:50%; mix-blend-mode:screen;}
  .b1{background:#ff5a5f; top:-10%; left:-8%; animation:drift1 18s ease-in-out infinite;}
  .b2{background:#2f9bff; bottom:-12%; right:-6%; animation:drift2 22s ease-in-out infinite;}
  .b3{background:#9b6dff; top:30%; right:18%; animation:drift3 20s ease-in-out infinite;}
  .b4{background:#4ecb71; bottom:8%; left:14%; animation:drift1 26s ease-in-out infinite reverse;}
  .b5{background:#ffd23f; top:6%; right:30%; width:30vmax; height:30vmax; animation:drift2 24s ease-in-out infinite;}
  @keyframes drift1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(8vmax,6vmax) scale(1.15);}}
  @keyframes drift2{0%,100%{transform:translate(0,0) scale(1.1);}50%{transform:translate(-7vmax,-5vmax) scale(.9);}}
  @keyframes drift3{0%,100%{transform:translate(0,0) scale(.95);}50%{transform:translate(-5vmax,7vmax) scale(1.2);}}

  canvas#confetti{position:fixed; inset:0; pointer-events:none; z-index:30;}

  .app{position:relative; z-index:10; width:100%; max-width:430px;}
  .appbar{display:flex; align-items:center; gap:12px; padding:4px 4px 18px;}
  .appicon{width:54px; height:54px; border-radius:30%; background:var(--rainbow);
    display:grid; place-items:center; box-shadow:0 10px 30px rgba(155,109,255,.45); flex-shrink:0;}
  .appicon svg{width:30px; height:30px;}
  .appname{font-family:'Unbounded',sans-serif; font-weight:700; font-size:19px; line-height:1.1; letter-spacing:.01em;}
  .appname small{display:block; font-family:'Onest',sans-serif; font-weight:500; font-size:12px; color:var(--muted); letter-spacing:.04em; margin-top:3px;}

  .track{height:6px; border-radius:6px; background:rgba(255,255,255,.08); overflow:hidden; margin-bottom:18px;}
  .fill{height:100%; width:33%; border-radius:6px; background:var(--rainbow);
    transition:width .6s cubic-bezier(.22,1,.36,1); box-shadow:0 0 14px rgba(255,108,171,.6);}

  .card{background:var(--glass); border:1px solid var(--stroke); border-radius:26px;
    padding:26px 22px 30px; backdrop-filter:blur(22px) saturate(140%); -webkit-backdrop-filter:blur(22px) saturate(140%);
    box-shadow:0 24px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);}

  .screen{display:none;}
  .screen.active{display:block; animation:screenIn .55s cubic-bezier(.22,1,.36,1);}
  @keyframes screenIn{from{opacity:0; transform:translateY(20px) scale(.97);} to{opacity:1; transform:none;}}

  .eyebrow{font-family:'Unbounded',sans-serif; font-weight:500; font-size:11px; letter-spacing:.16em; color:var(--muted); text-transform:uppercase;}
  .q{font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; line-height:1.25; margin:8px 0 18px;}

  .frame{background:linear-gradient(180deg,#fbf8ff,#efe8fa); border-radius:18px; padding:6px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.7), 0 6px 20px rgba(0,0,0,.2); margin-bottom:18px;}
  .frame svg{display:block; width:100%; height:auto; border-radius:13px;}

  .qbox{position:relative; height:210px; margin-top:8px;}
  .btn{font-family:'Onest',sans-serif; font-weight:700; cursor:pointer; border:none;}
  .btn-yes,.btn-no{position:absolute; left:50%; margin-left:-105px; width:210px; height:58px;
    display:grid; place-items:center; font-size:17px; border-radius:16px; white-space:nowrap;
    transition:transform .14s ease, box-shadow .2s ease;}
  .btn-yes{top:16px; color:#1a0f24; background:var(--rainbow); box-shadow:0 12px 30px rgba(255,108,171,.4);}
  .btn-yes:hover{box-shadow:0 16px 40px rgba(255,108,171,.55);}
  .btn-yes:active{transform:scale(.95);}
  .btn-no{top:136px; color:var(--ink); background:var(--glass-hi); border:1px solid var(--stroke-hi);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    transition:left .2s ease, top .2s ease, transform .14s ease;}

  .teas{display:grid; grid-template-columns:1fr 1fr; gap:11px;}
  .tea{position:relative; display:flex; align-items:center; gap:11px; padding:15px 14px; cursor:pointer;
    background:var(--glass); border:1px solid var(--stroke); border-radius:16px; color:var(--ink);
    font-family:'Onest',sans-serif; font-weight:600; font-size:15px; text-align:left;
    transition:transform .15s ease, border-color .2s ease, background .2s ease;}
  .tea:hover{border-color:var(--stroke-hi); background:var(--glass-hi);}
  .tea.sel{transform:translateY(-2px);
    background:linear-gradient(var(--glass-hi),var(--glass-hi)) padding-box,var(--rainbow) border-box;
    border:1.5px solid transparent; box-shadow:0 10px 26px rgba(155,109,255,.3);}
  .swatch{width:30px; height:30px; border-radius:10px; flex-shrink:0; display:grid; place-items:center;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.25);}
  .swatch svg{width:18px; height:18px;}
  .check{position:absolute; top:8px; right:8px; width:20px; height:20px; border-radius:50%;
    background:var(--rainbow); display:none; place-items:center; color:#1a0f24; font-size:12px; font-weight:800;}
  .tea.sel .check{display:grid; animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
  @keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}

  .fields{display:flex; gap:11px; flex-wrap:wrap; margin-bottom:6px;}
  .field{flex:1; min-width:140px;}
  .field label{display:block; font-size:12px; color:var(--muted); margin:0 0 7px 4px; font-weight:500;}
  input[type=date],input[type=time]{width:100%; font-family:'Onest',sans-serif; font-size:15px; color:var(--ink);
    padding:14px 14px; border-radius:14px; border:1px solid var(--stroke); background:var(--glass);
    color-scheme:dark; transition:border-color .2s ease;}
  input:focus{outline:none; border-color:var(--stroke-hi); box-shadow:0 0 0 3px rgba(155,109,255,.3);}

  .cta{display:block; width:100%; font-family:'Unbounded',sans-serif; font-weight:500; font-size:17px;
    padding:17px; border-radius:16px; border:none; cursor:pointer; color:#1a0f24; background:var(--rainbow);
    margin-top:20px; box-shadow:0 12px 30px rgba(255,108,171,.4); transition:transform .14s ease, box-shadow .2s ease;}
  .cta:active{transform:scale(.97);}

  #screenResult{text-align:center;}
  .ticket-badge{width:84px; height:84px; border-radius:50%; margin:6px auto 14px; background:var(--rainbow);
    display:grid; place-items:center; box-shadow:0 14px 38px rgba(255,108,171,.5); animation:pop .5s cubic-bezier(.34,1.56,.64,1);}
  .ticket-badge svg{width:42px; height:42px;}
  .done-title{font-family:'Unbounded',sans-serif; font-weight:800; font-size:26px; margin:0 0 4px;}
  .done-sub{color:var(--muted); font-size:14px; margin:0 0 18px;}
  .rows{text-align:left; border:1px solid var(--stroke); border-radius:16px; overflow:hidden; margin-bottom:6px;}
  .rrow{display:flex; align-items:center; gap:12px; padding:15px 16px;}
  .rrow + .rrow{border-top:1px dashed var(--stroke);}
  .rrow .ic{width:34px; height:34px; border-radius:10px; background:var(--glass-hi); display:grid; place-items:center; flex-shrink:0;}
  .rrow .ic svg{width:18px; height:18px;}
  .rrow .lbl{font-size:12px; color:var(--muted);}
  .rrow .val{font-weight:700; font-size:16px;}
  #rStatus{font-size:12.5px; color:var(--faint); margin:14px 0 0;}
  .again{margin-top:14px; background:var(--glass); border:1px solid var(--stroke); color:var(--muted);
    font-family:'Onest',sans-serif; font-weight:600; font-size:14px; padding:13px 22px; border-radius:14px; cursor:pointer;}
  .again:active{transform:scale(.96);}

  .foot{text-align:center; color:var(--faint); font-size:11px; margin-top:16px; letter-spacing:.02em;}
  .steam{animation:steam 3s ease-in-out infinite;}
  @keyframes steam{0%,100%{opacity:.6; transform:translateY(0);}50%{opacity:1; transform:translateY(-3px);}}

  :focus-visible{outline:2px solid #ff9f43; outline-offset:2px;}
  @media (prefers-reduced-motion:reduce){
    .aurora .blob,.steam,.screen.active,.ticket-badge,.tea.sel .check{animation:none;}
    .fill,.btn,.tea,.cta{transition:none;}
  }
</style>
</head>
<body>

<script>
(function(){
  "use strict";

  var BOT_TOKEN = "8495998202:AAHw5nCzvODDOgXtuGuOYcz1sMa93EtKJUo";
  var CHAT_ID   = "295532787";

  /* имя кента из Telegram (если страница открыта как Web App бота) */
  var KENT = "Кент", KENT_USER = "";
  try {
    var tg = window.Telegram && window.Telegram.WebApp;
    if (tg) {
      tg.ready(); tg.expand();
      var u = tg.initDataUnsafe && tg.initDataUnsafe.user;
      if (u) {
        KENT = u.first_name + (u.last_name ? " " + u.last_name : "");
        KENT_USER = u.username ? " (@" + u.username + ")" : "";
      }
    }
  } catch(e){}

  function sendToTelegram(tea, dateStr, timeStr){
    var status = document.getElementById('rStatus');
    if(BOT_TOKEN.indexOf("ВСТАВЬ") === 0 || CHAT_ID.indexOf("ВСТАВЬ") === 0){ status.textContent = "(телеграм не настроен)"; return; }
    var text = "🏳️‍🌈 " + KENT + KENT_USER + " забронировал вас на чай " + dateStr + " в " + timeStr + "\n\n🍵 Чай: " + tea + "\n🩲 Дресс-код: " + undies;
    status.textContent = "отправляю в телеграм…";
    fetch("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ chat_id: CHAT_ID, text: text })
    }).then(function(r){ return r.json(); })
      .then(function(d){ status.textContent = d.ok ? "отправлено в телеграм ✓" : "не отправилось: " + (d.description || "ошибка"); })
      .catch(function(){ status.textContent = "не отправилось (нет сети?)"; });
  }

  var fill = document.getElementById('fill');
  var widths = { screen1:'25%', screen2:'50%', screenUndies:'75%', screen3:'100%', screenResult:'100%' };
  function goTo(id){
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
    fill.style.width = widths[id] || '100%';
    window.scrollTo({top:0, behavior:'smooth'});
  }

  var no = document.getElementById('no');
  var yes = document.getElementById('yes');
  var box = document.getElementById('qbox');
  var taunts = ['не-а','попробуй ещё','не выйдет','мимо 🙃','ага, щас','хитрюга','не туда','ну попробуй','я быстрее','не сегодня'];
  var ti = 0;
  function flee(){
    var bw = box.clientWidth, bh = box.clientHeight;
    no.textContent = taunts[ti % taunts.length]; ti++;
    var nw = no.offsetWidth, nh = no.offsetHeight;
    var yb = yes.getBoundingClientRect(), qb = box.getBoundingClientRect();
    var yx = yb.left - qb.left, yy = yb.top - qb.top, yw = yb.width, yh = yb.height;
    var pad = 12, x = 0, y = 0, sep = false, tries = 0;
    do {
      x = Math.random() * Math.max(0, bw - nw);
      y = Math.random() * Math.max(0, bh - nh);
      sep = (x + nw + pad < yx) || (x > yx + yw + pad) || (y + nh + pad < yy) || (y > yy + yh + pad);
      tries++;
    } while (!sep && tries < 40);
    if(!sep){ y = Math.min(bh - nh, yy + yh + pad); }
    no.style.left = x + 'px'; no.style.right = 'auto'; no.style.marginLeft = '0';
    no.style.top = y + 'px';
  }
  ['mouseover','mousedown','focus'].forEach(function(ev){ no.addEventListener(ev, flee); });
  no.addEventListener('click', function(e){ e.preventDefault(); flee(); });
  no.addEventListener('touchstart', function(e){ e.preventDefault(); flee(); }, {passive:false});
  document.getElementById('yes').addEventListener('click', function(){ goTo('screen2'); });

  var teas = [
    {n:'Пуэр', c:'#7a3b1d'}, {n:'Габа-пуэр', c:'#a64a22'},
    {n:'Красный', c:'#ff5a5f'}, {n:'Габа', c:'#4ecb71'},
    {n:'Кумкват', c:'#ff9f43'}, {n:'Другой', c:'#9b6dff'}
  ];
  var chosen = null;
  var grid = document.getElementById('teas');
  teas.forEach(function(t){
    var b = document.createElement('button');
    b.className = 'tea';
    b.innerHTML = '<span class="swatch" style="background:'+t.c+'"><svg viewBox="0 0 24 24" fill="none"><path d="M5 10h11v4a5.5 5.5 0 0 1-11 0z" fill="#fff"/><path d="M16 11q3.5 0 3.5 3T16 17" stroke="#fff" stroke-width="2" fill="none"/></svg></span><span>'+t.n+'</span><span class="check">✓</span>';
    b.addEventListener('click', function(){
      chosen = t.n;
      Array.prototype.forEach.call(grid.children, function(c){ c.classList.remove('sel'); });
      b.classList.add('sel');
      setTimeout(function(){ goTo('screenUndies'); }, 280);
    });
    grid.appendChild(b);
  });

  /* вопрос про трусики */
  var undiesOpts = [
    {n:'В трусиках', c:'#ff6cab'}, {n:'Без 🍑', c:'#ffd23f'},
    {n:'Сюрприз 😏', c:'#9b6dff'}, {n:'Решим на месте', c:'#4ecb71'}
  ];
  var undies = null;
  var ug = document.getElementById('undies');
  undiesOpts.forEach(function(o){
    var b = document.createElement('button');
    b.className = 'tea';
    b.innerHTML = '<span class="swatch" style="background:'+o.c+'"><svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16v3q-4 9 -6 9q-2 -5 -2 -7q0 2 -2 7q-2 0 -6 -9z" fill="#fff"/></svg></span><span>'+o.n+'</span><span class="check">✓</span>';
    b.addEventListener('click', function(){
      undies = o.n;
      Array.prototype.forEach.call(ug.children, function(c){ c.classList.remove('sel'); });
      b.classList.add('sel');
      setTimeout(function(){ goTo('screen3'); }, 280);
    });
    ug.appendChild(b);
  });

  document.getElementById('done').addEventListener('click', function(){
    var d = document.getElementById('date').value;
    var t = document.getElementById('time').value;
    if(!d || !t){ alert('Выбери дату и время ⏰'); return; }
    var dt = new Date(d + 'T' + t);
    var dateStr = dt.toLocaleDateString('ru-RU', {day:'numeric', month:'long'});
    var timeStr = dt.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('rTea').textContent = chosen;
    document.getElementById('rWhen').textContent = dateStr + ', ' + timeStr;
    goTo('screenResult'); burst(); sendToTelegram(chosen, dateStr, timeStr);
  });

  document.getElementById('again').addEventListener('click', function(){ location.reload(); });

  var canvas = document.getElementById('confetti');
  var ctx = canvas.getContext('2d');
  var parts = [], raf = null;
  var colors = ['#ff5a5f','#ff9f43','#ffd23f','#4ecb71','#2f9bff','#9b6dff','#ff6cab'];
  function size(){ canvas.width = innerWidth; canvas.height = innerHeight; }
  addEventListener('resize', size); size();
  function burst(){
    if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    parts = [];
    for(var i=0;i<160;i++){ parts.push({ x: innerWidth/2, y: innerHeight/3, vx:(Math.random()-0.5)*13, vy:Math.random()*-13-3, s:Math.random()*8+4, c:colors[i%colors.length], rot:Math.random()*6, vr:(Math.random()-0.5)*0.3, life:0 }); }
    if(!raf) tick();
  }
  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    var alive = false;
    parts.forEach(function(p){
      p.life++; p.vy += 0.36; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      if(p.y < canvas.height + 30 && p.life < 220){ alive = true; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle = p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); ctx.restore(); }
    });
    if(alive){ raf = requestAnimationFrame(tick); } else { ctx.clearRect(0,0,canvas.width,canvas.height); raf = null; }
  }
})();
</script>
